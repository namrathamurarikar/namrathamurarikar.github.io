# Build and deploy to GitHub Pages (Settings → Pages → Source: GitHub Actions).
# - Repo named <user>.github.io → site at https://<user>.github.io/  (base /)
# - Any other repo → site at https://<user>.github.io/<repo>/  (base /<repo>/)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: # lets you run deploy manually from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        env:
          # Must reach Vite’s Node process (shell `export` alone can be missed by some runners)
          VITE_BASE_URL: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          echo "VITE_BASE_URL=$VITE_BASE_URL"
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
